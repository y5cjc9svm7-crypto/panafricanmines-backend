.h{font-family:'Tarpino',Fraunces,serif}
::selection{background:var(--copper);color:var(--stone)}
button{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:1px solid var(--copper)}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px}
.tag{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper);font-weight:600;display:inline-flex;align-items:center;gap:6px}
/* logo metallic shine — 1/3 speed continuous */
.logo-wrap{position:relative;display:inline-block;isolation:isolate;line-height:0;vertical-align:middle}
.logo-img{height:34px;display:block}
.logo-img-sm{height:28px;display:block}
.logo-shine{position:absolute;inset:0;-webkit-mask-image:var(--logo-url);mask-image:var(--logo-url);-webkit-mask-size:100% 100%;mask-size:100% 100%;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;background:linear-gradient(115deg,transparent 44%,rgba(255,228,188,.55) 48%,rgba(255,238,205,.92) 50%,rgba(255,228,188,.55) 52%,transparent 56%);background-size:260% 100%;background-position:140% 0;animation:lshine 15s linear infinite;mix-blend-mode:screen;pointer-events:none}
@keyframes lshine{0%{background-position:140% 0}100%{background-position:-15% 0}}

.hdr-in{height:68px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-txt{font-size:19px;font-weight:600;color:var(--espresso)}
.nav{display:flex;align-items:center;gap:2px}
.nav button{background:none;border:none;cursor:pointer;font-size:14px;padding:8px 13px;color:var(--ink);font-weight:500}
.nav button.on{color:var(--copper);font-weight:600}
.nav button.op{border:1px solid var(--line);font-size:13px;padding:7px 13px;margin-left:8px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.nav button.op.on{background:var(--espresso);color:var(--stone)}
/* language toggle */
.lang{display:inline-flex;gap:0;margin-left:10px;border:1px solid var(--line)}
.lang button{padding:5px 8px;background:var(--stone);border:none;cursor:pointer;display:flex;align-items:center;opacity:.75;transition:opacity .15s}
.lang button.on{opacity:1;background:var(--stoneDeep)}
.lang button:hover{opacity:.95}
.lang svg{display:block;filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.15))}
/* buttons */
.btn{font-size:14px;font-weight:600;padding:12px 22px;cursor:pointer;border:1px solid;display:inline-flex;align-items:center;gap:7px;justify-content:center;transition:all .18s}
.btn.sm{font-size:12.5px;padding:7px 13px}
.btn.primary{background:var(--copper);border-color:var(--copper);color:var(--stone)}
.btn.primary:hover{background:var(--copperDeep)}
.btn.dark{background:var(--espresso);border-color:var(--espresso);color:var(--stone)}
.btn.outline{background:transparent;border-color:var(--line);color:var(--ink)}
.btn.danger{background:transparent;border-color:#C99;color:#9A4A3A}
.btn[disabled]{opacity:.45;cursor:not-allowed}

.hero-in{padding-top:92px;padding-bottom:80px}
.hero h1{font-size:56px;line-height:1.04;font-weight:600;margin-top:20px;max-width:720px;letter-spacing:-.02em}
.hero h1 .c{color:var(--copper)}
.hero p{font-size:17px;line-height:1.6;color:#C9BFB1;max-width:480px;margin:26px 0 34px}
.hero-stats{display:flex;gap:40px;margin-top:56px}
.hero-stats .n{font-size:34px;font-weight:600;color:var(--copper)}
.hero-stats .l{font-size:12.5px;color:#9B9183;margin-top:2px;max-width:140px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sec{padding-top:80px;padding-bottom:80px}
.sec h2{font-size:34px;font-weight:600;color:var(--espresso);margin:10px 0 44px}
.steps{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line)}
.step{padding:26px 22px}
.step:first-child{padding-left:0}
.step:not(:last-child){border-right:1px solid var(--line)}
.step .n{font-size:30px;color:var(--copper);font-weight:600}
.step .t{font-size:15px;font-weight:600;color:var(--espresso);margin:10px 0 6px}
.step .d{font-size:13.5px;line-height:1.55;color:var(--muted)}

.band-in{padding-top:64px;padding-bottom:64px;display:flex;gap:56px;flex-wrap:wrap}
.band h2{font-size:32px;font-weight:600;color:var(--espresso);margin-top:10px;line-height:1.15}
.band p{font-size:15px;color:var(--muted);margin-top:14px;line-height:1.6;max-width:380px}
.princ{flex:1 1 360px;display:grid;gap:14px}
.princ-row{display:flex;gap:14px;align-items:flex-start}
.princ-ic{width:34px;height:34px;background:var(--espresso);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.princ .t{font-size:14.5px;font-weight:600;color:var(--espresso)}
.princ .d{font-size:13.5px;color:var(--muted);margin-top:2px}
.page{padding-top:48px;padding-bottom:80px}
.page h1{font-size:36px;font-weight:600;color:var(--espresso);margin:8px 0 4px}
.page .sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.field .lab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.field .val{font-size:14px;color:var(--ink);font-weight:500}
.pill{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.filters{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.inp{font-size:13.5px;padding:11px 12px;border:1px solid var(--line);background:var(--stone);color:var(--ink)}
select.inp{cursor:pointer;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 16px) 50%,calc(100% - 11px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:30px}
.search{position:relative}
.search svg{position:absolute;left:12px;top:13px}
.search input{width:100%;padding-left:34px}
.count{font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.count .notify{font-size:12.5px;color:var(--copper);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:none;background:none;padding:0}
.count .notify:hover{color:var(--copperDeep)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{background:var(--stone);border:1px solid var(--line);padding:22px;cursor:pointer;transition:border-color .18s}
.card:hover{border-color:var(--copper)}
.card-top{display:flex;justify-content:space-between;align-items:baseline}
.card-id{font-size:11.5px;letter-spacing:.1em;color:var(--ore);font-weight:600}
.card h3{font-size:19px;font-weight:600;color:var(--espresso);margin:8px 0 6px;line-height:1.2}
.card-loc{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:13px;margin-bottom:16px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:14px;border-top:1px solid var(--line)}
.back{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:28px;padding:0}
.detail-narrow{max-width:880px}
.detail h1{font-size:38px;font-weight:600;color:var(--espresso);margin:10px 0 8px;line-height:1.1}
.detail-loc{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:14px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;background:var(--stoneDeep);border:1px solid var(--line);padding:24px;margin:28px 0}
.detail p{font-size:15px;line-height:1.65;color:var(--ink);max-width:620px}
.cta{margin-top:32px;padding:24px;border:1px solid var(--line);background:var(--stone);display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.cta .t{font-size:18px;font-weight:600;color:var(--espresso)}
.cta .d{font-size:13px;color:var(--muted);margin-top:2px}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.crumb button{background:none;border:none;padding:0;font-size:13px;cursor:pointer}
.heat{border:1px solid var(--line);overflow:hidden}
.heat-head,.heat-row{display:grid;grid-template-columns:1.4fr repeat(6,1fr) .7fr}
.heat-head{background:var(--espresso)}
.heat-head div{padding:12px 8px;font-size:10.5px;color:#C9BFB1;text-transform:uppercase;letter-spacing:.06em;text-align:center;line-height:1.3}
.heat-head .tot{color:var(--copper);font-weight:700}
.heat-row{cursor:pointer;border-top:1px solid var(--line)}
.heat-row:hover{outline:2px solid var(--copper)}
.heat-lab{padding:13px 14px;font-size:13.5px;font-weight:600;color:var(--espresso);background:var(--stone);display:flex;align-items:center;justify-content:space-between}
.heat-cell{padding:13px 8px;text-align:center;font-size:13px;font-weight:600}
.heat-tot{padding:13px 8px;text-align:center;font-size:13.5px;font-weight:700;color:var(--espresso);background:var(--stoneDeep)}
.form-narrow{max-width:720px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px}
.form-grid .full{grid-column:1/-1}
.form-grid label{font-size:12px;font-weight:600;color:var(--espresso);margin-bottom:5px;display:block}
.form-grid input,.form-grid select{width:100%}
.sign{margin-top:24px;padding:18px;border:1px solid var(--line);background:var(--stone);display:flex;gap:12px;align-items:flex-start;cursor:pointer}
.sign-box{width:22px;height:22px;flex-shrink:0;border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.sign-box.on{border-color:var(--copper);background:var(--copper)}
.sign-txt{font-size:13px;color:var(--ink);line-height:1.55}

.modal h2{font-size:22px;font-weight:600;color:var(--espresso);margin-bottom:6px}
.modal .doc{margin:18px 0 18px;padding:18px;background:var(--stoneDeep);border:1px solid var(--line);font-size:13px;line-height:1.6;color:var(--ink);white-space:pre-wrap;max-height:260px;overflow-y:auto}
.modal .doc-title{font-weight:700;font-size:14px;margin-bottom:10px;letter-spacing:.05em;color:var(--espresso)}
.sig-canvas{display:block;width:100%;height:160px;background:#fff;border:1px solid var(--line);cursor:crosshair;touch-action:none}
.sig-hint{font-size:12px;color:var(--muted);margin-top:6px}
.sig-empty-warn{font-size:12.5px;color:#9A4A3A;margin-top:6px}
.modal-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
/* operator */
.stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{border:1px solid var(--line);background:var(--stone);padding:16px 18px}
.stat .n{font-size:26px;font-weight:600;color:var(--copper)}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tabs button{font-size:13px;font-weight:600;cursor:pointer;padding:8px 14px;border:1px solid var(--line);background:var(--stone);color:var(--ink)}
.tabs button.on{border-color:var(--copper);background:var(--copper);color:var(--stone)}
.optable{border:1px solid var(--line)}
.op-head,.op-row{display:grid;grid-template-columns:1fr 2fr 1.3fr 1fr .9fr 1.7fr;align-items:center}
.op-head{background:var(--espresso);color:#C9BFB1;font-size:11px;text-transform:uppercase;letter-spacing:.07em}
.op-head div{padding:12px 14px}
.op-row{border-top:1px solid var(--line);background:var(--stone)}
.op-row>div{padding:12px 14px}
.op-id{font-size:12px;color:var(--ore);font-weight:600}
.op-asset{font-size:13.5px;color:var(--espresso);font-weight:500;cursor:pointer}
.op-actions{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px!important}
/* legal */
.legal{max-width:760px}
.legal h2{font-family:'Tarpino',Fraunces,serif;font-size:18px;color:var(--espresso);margin:26px 0 10px}
.legal p{font-size:14.5px;line-height:1.65;color:var(--ink);margin-bottom:12px}
.legal .updated{font-size:12.5px;color:var(--muted);margin-bottom:30px;text-transform:uppercase;letter-spacing:.06em}
/* alerts */
.alert-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:14px;align-items:center;padding:14px 18px;border:1px solid var(--line);background:var(--stone);margin-bottom:8px}
.alert-row .k{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.alert-row .v{font-size:13.5px;color:var(--espresso);font-weight:500}
.alert-row .e{font-size:12.5px;color:var(--muted)}

function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}

function buildDataset(){
  const r = mulberry32(20260519);
  const pick = a => a[Math.floor(r()*a.length)];
  const items = [];
  // 4 curated copper-focused Zambian entries
  items.push({ id:'PAM-ZM-0001', name:'Solwezi NW Cu Block', country:'Zambia', region:'East Africa', district:'Solwezi District, NW Province', commodity:'Copper', family:'Base metals', licence:'Large-scale mining licence', area:1240, stage:'Resource definition', priceLabel:'$7M–14M', priceVal:10000000, status:'Live' });
  items.push({ id:'PAM-ZM-0002', name:'Chingola Copperbelt Concession', country:'Zambia', region:'East Africa', district:'Chingola, Copperbelt', commodity:'Copper', family:'Base metals', licence:'Exploration licence', area:680, stage:'Brownfield exploration', priceLabel:'$1.8M–3.5M', priceVal:2500000, status:'Live' });
  items.push({ id:'PAM-ZM-0003', name:'Mumbwa Cu-Co Tenement', country:'Zambia', region:'East Africa', district:'Mumbwa, Central Province', commodity:'Cobalt', family:'Base metals', licence:'Exploration licence', area:920, stage:'Greenfield exploration', priceLabel:'$0.9M–1.8M', priceVal:1300000, status:'Live' });
  items.push({ id:'PAM-ZM-0004', name:'Lufwanyama Cu Block', country:'Zambia', region:'East Africa', district:'Lufwanyama, Copperbelt', commodity:'Copper', family:'Base metals', licence:'Large-scale mining licence', area:1810, stage:'Pre-feasibility', priceLabel:'$14M–28M', priceVal:20000000, status:'Live' });
  // 40 generated entries across all 13 countries
  for(let i=0;i<40;i++){
    const c = pick(COUNTRY_DATA);
    const family = pick(FAMILIES);
    const commodity = pick(FAMILY_COMMS[family]);
    const district = pick(c.districts);
    const lic = pick(LICENCES_T);
    const stage = pick(STAGES);
    const tw = pick(TYPE_WORDS);
    const ar = pick(AREA_RANGE);
    const area = Math.floor(ar[0] + r()*(ar[1]-ar[0]));
    const pt = pick(PRICE_TIERS);
    const code = COMM_CODE[commodity] || commodity.slice(0,2);
    const name = district.split(',')[0] + ' ' + code + ' ' + tw;
    const sr = r();
    const status = sr < 0.09 ? 'Pending review' : (sr < 0.17 ? 'Under offer' : 'Live');
    items.push({ id:'PAM-'+c.cc+'-'+String(i+5).padStart(4,'0'), name, country:c.name, region:c.region, district, commodity, family, licence:lic, area, stage, priceLabel:pt[0], priceVal:pt[1], status });
  }
  return items;
}

   ==
   ==  >>> HIER deine Backend-Adresse eintragen (zwischen die Anführungszeichen). <<<
   ==
   ==  Beispiel:  "https://panafricanmines-api.onrender.com/api/v1"
   ==  Wichtig:   die Adresse muss mit /api/v1 enden und KEINEN
   ==            Schrägstrich danach haben.

const API_BASE = "HIER_BACKEND_ADRESSE_EINTRAGEN/api/v1";
/* ===================================================================== */

function _apiConfigured(){ return API_BASE.indexOf("HIER_BACKEND") === -1; }

async function apiFetch(path, opts){
  opts = opts || {};
  const headers = opts.headers || {};
  if(opts.body !== undefined) headers["Content-Type"] = "application/json";
  if(opts.auth && S.opToken) headers["Authorization"] = "Bearer " + S.opToken;
  const res = await fetch(API_BASE + path, {
    method: opts.method || "GET",
    headers,
    body: opts.body !== undefined ? JSON.stringify(opts.body) : undefined
  });
  let data = null; const txt = await res.text();
  if(txt){ try{ data = JSON.parse(txt); }catch(e){ data = txt; } }
  if(!res.ok){
    const m = (data && data.error && data.error.message) || (data && data.message) || ("Fehler ("+res.status+")");
    const err = new Error(m); err.status = res.status; throw err;
  }
  return data;
}

  if(!af.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(af.email)){ alert(t('al_email_invalid')); return; }
  if(!_apiConfigured()){ alert("Die Website ist noch nicht mit dem Backend verbunden."); return; }
  try{
    await apiFetch("/alerts", { method:"POST", body:{ email:af.email, commodity:af.commodity, country:af.country, licence:af.licence } });
    S.alertDonePayload = { commodity:af.commodity, country:af.country, email:af.email };
    S.alertDone = true; S.alertEmail = af.email;
    try{ const d = await apiFetch("/alerts?email=" + encodeURIComponent(af.email)); S.alerts = (d && d.alerts) ? d.alerts : []; }catch(e){}

function selOpt(items, sel, ph){
  let h = '';
  if(ph) h += '<option value="">'+esc(ph)+'</option>';
  for(const it of items){
    if(typeof it === 'object' && it.g){
      h += '<optgroup label="'+esc(it.g)+'">';
      for(const x of it.items) h += '<option value="'+esc(x)+'"'+(sel===x?' selected':'')+'>'+esc(x)+'</option>';
      h += '</optgroup>';
    } else {
      h += '<option value="'+esc(it)+'"'+(sel===it?' selected':'')+'>'+esc(it)+'</option>';
    }
  }
  return h;
}

function heatCell(count, max, isTotal){
  if(isTotal) return '<div class="heat-tot">'+count+'</div>';
  if(count === 0) return '<div class="heat-cell" style="color:#bbb">·</div>';
  const intensity = Math.min(count / Math.max(max,1), 1);
  const alpha = 0.15 + intensity * 0.65;
  return '<div class="heat-cell" style="background:rgba(168,102,60,'+alpha.toFixed(2)+');color:'+(intensity>0.5?'#fff':'var(--espresso)')+'">'+count+'</div>';
}
function heatTable(rows, items){
  let maxV = 0;
  for(const r of rows){ for(const f of FAMILIES){ const v = items.filter(l=>l[r.key]===r.val && l.family===f).length; if(v>maxV) maxV=v; } }
  return '<div class="heat scrollx"><div class="heat-head"><div>'+(rows[0] && rows[0].label==='REGION' ? 'REGION' : 'COUNTRY')+'</div>'+FAMILIES.map(f=>'<div>'+esc(f)+'</div>').join('')+'<div class="tot">'+esc(t('heat_total'))+'</div></div>'+
    rows.map(r=>{
      const inR = items.filter(l => l[r.key]===r.val);
      const total = inR.length;
      const cells = FAMILIES.map(f => heatCell(inR.filter(l=>l.family===f).length, maxV, false)).join('');
      return '<div class="heat-row" data-pick="'+esc(r.key)+':'+esc(r.val)+'"><div class="heat-lab">'+esc(r.val)+ic('chevR',12,'var(--muted)')+'</div>'+cells+heatCell(total, maxV, true)+'</div>';
    }).join('')+
  '</div>';
}
function explore(){
  const items = publicListings();
  let body;

  }
  if(S.ex.country){
    breadcrumbs.push('<span style="color:var(--muted)">/</span>');
    breadcrumbs.push('<button style="color:var(--ink);font-weight:600">'+esc(S.ex.country)+'</button>');
  }
  if(!S.ex.region){
    const rows = REGIONS.map(r=>({key:'region',val:r,label:'REGION'}));
    body = '<p class="sub" style="margin-top:0;margin-bottom:24px">'+esc(t('ex_intro1'))+'</p>'+heatTable(rows, items);
  } else if(!S.ex.country){
    const inReg = items.filter(l=>l.region===S.ex.region);
    const countries = Array.from(new Set(inReg.map(l=>l.country))).sort();
    const rows = countries.map(c=>({key:'country',val:c,label:'COUNTRY'}));
    body = '<p class="sub" style="margin-top:0;margin-bottom:24px">'+esc(S.ex.region+' '+t('ex_intro2_a'))+'</p>'+heatTable(rows, inReg);
  } else {
    const inCountry = items.filter(l=>l.country===S.ex.country);
    const n = inCountry.length;
    body = '<p class="sub" style="margin-top:0;margin-bottom:24px"><strong>'+n+'</strong> '+esc(n===1?t('ex_intro3_a'):t('ex_intro3_b'))+' '+esc(S.ex.country)+'.</p>'+

    '<h1 class="h">'+esc(t('ex_h'))+'</h1>'+

/* ============================================================
   Pages: operator back-office
   ============================================================ */
function operator(){
  if(!S.opToken){ return opLoginView(); }
  const all = S.opListings;
  const counts = {
    'Pending review': all.filter(l=>l.status==='Pending review').length,
    'Live': all.filter(l=>l.status==='Live').length,
    'Under offer': all.filter(l=>l.status==='Under offer').length,
    'Closed': all.filter(l=>l.status==='Closed').length,
  };
  const feeTotal = all.filter(l=>l.status==='Closed' && l.feeInvoiced).reduce((s,l)=>s+l.feeInvoiced,0);
  const tab = S.opTab;
  let rows = all;
  if(tab !== 'All') rows = rows.filter(l=>l.status===tab);
  const tabs = [['Pending review','op_t_pending'],['Live','op_t_live'],['Under offer','op_t_offer'],['Closed','op_t_closed'],['All','op_t_all']];
  return '<div class="wrap page">'+
    '<div class="tag">'+ic('clip',14,'var(--copper)')+esc(t('op_tag'))+'</div>'+
    '<h1 class="h">'+esc(t('op_h'))+'</h1>'+
    '<p class="sub">'+esc(t('op_sub'))+'</p>'+
    '<div class="stats4">'+
      '<div class="stat"><div class="n h">'+counts['Pending review']+'</div><div class="l">'+esc(t('op_pending'))+'</div></div>'+
      '<div class="stat"><div class="n h">'+counts['Live']+'</div><div class="l">'+esc(t('op_live_lst'))+'</div></div>'+
      '<div class="stat"><div class="n h">'+counts['Under offer']+'</div><div class="l">'+esc(t('op_offer_s'))+'</div></div>'+
      '<div class="stat"><div class="n h">'+formatUSD(feeTotal)+'</div><div class="l">'+esc(t('op_fees'))+'</div></div>'+
    '</div>'+
    '<div class="tabs">'+tabs.map(tt=>'<button data-tab="'+tt[0]+'" class="'+(tab===tt[0]?'on':'')+'">'+esc(t(tt[1]))+' ('+(tt[0]==='All'?all.length:counts[tt[0]]||0)+')</button>').join('')+'</div>'+
    '<div class="optable scrollx"><div class="op-head"><div>'+esc(t('op_h_id'))+'</div><div>'+esc(t('op_h_asset'))+'</div><div>'+esc(t('op_h_country'))+'</div><div>'+esc(t('op_h_guide'))+'</div><div>'+esc(t('op_h_status'))+'</div><div>'+esc(t('op_h_action'))+'</div></div>'+
      (rows.length === 0 ? '<div class="op-row"><div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px">'+esc(t('op_empty'))+'</div></div>' :
      rows.map(l=>{
        let act = '';
        if(l.status==='Pending review') act = '<button class="btn sm primary" data-op="publish" data-id="'+esc(l.id)+'">'+esc(t('op_a_publish'))+'</button><button class="btn sm danger" data-op="decline" data-id="'+esc(l.id)+'">'+esc(t('op_a_decline'))+'</button>';
        else if(l.status==='Live') act = '<button class="btn sm outline" data-op="offer" data-id="'+esc(l.id)+'">'+esc(t('op_a_offer'))+'</button>';
        else if(l.status==='Under offer') act = '<button class="btn sm dark" data-op="close" data-id="'+esc(l.id)+'">'+esc(t('op_a_close'))+'</button>';
        else if(l.status==='Closed' && l.feeInvoiced) act = '<span style="font-size:12px;color:var(--muted)">'+esc(t('op_a_invoiced'))+' '+formatUSD(l.feeInvoiced)+'</span>';
        else if(l.status==='Declined') act = '<span style="font-size:12px;color:var(--muted)">'+esc(t('op_not_pub'))+'</span>';
        return '<div class="op-row"><div class="op-id">'+esc(l.id)+'</div><div class="op-asset" data-open="'+esc(l.id)+'">'+esc(l.name)+'</div><div style="font-size:13px">'+esc(l.country)+'</div><div style="font-size:13px">'+esc(l.priceLabel)+'</div><div>'+pill(l.status)+'</div><div class="op-actions">'+act+'</div></div>';
      }).join(''))+
    '</div>'+
  '</div>';
}

function legal(key){
  const block = LEGAL_CONTENT[S.lang] || LEGAL_CONTENT.en;
  const h = key==='terms' ? block.terms_h : block.privacy_h;
  const body = key==='terms' ? block.terms_body : block.privacy_body;
  return '<div class="wrap page legal">'+
    '<div class="tag">'+ic('shield',14,'var(--copper)')+esc(t('ftr_legal'))+'</div>'+
    '<h1 class="h">'+esc(h)+'</h1>'+
    '<div class="updated">'+esc(t('last_updated'))+'</div>'+
    body.map(s=>'<h2 class="h">'+esc(s[0])+'</h2><p>'+esc(s[1])+'</p>').join('')+
  '</div>';
}

/* ============================================================
   Signature modal
   ============================================================ */
let _sigHasInk = false;
let _sigCtx = null;
function sigModalView(){
  return '<div class="modal-bg" data-act="sig-bg-click"><div class="modal">'+
    '<h2 class="h">'+esc(t('sig_t'))+'</h2>'+
    '<p style="font-size:13.5px;color:var(--muted);margin-top:6px">'+esc(t('sig_intro'))+'</p>'+
    '<div class="doc"><div class="doc-title">'+esc(t('sig_doc_title'))+'</div>'+esc(t('sig_doc_body'))+'</div>'+
    '<div style="font-size:13px;font-weight:600;color:var(--espresso);margin-bottom:6px">'+esc(t('sig_sign'))+'</div>'+
    '<canvas class="sig-canvas" id="sig-canvas" width="600" height="160"></canvas>'+
    '<div class="sig-hint">'+ic('pen',12,'var(--muted)')+' Click and drag to sign · '+ic('pen',12,'var(--muted)')+' Cliquez et glissez pour signer</div>'+
    '<div id="sig-warn" class="sig-empty-warn" style="display:none">'+esc(t('sig_empty'))+'</div>'+
    '<div class="modal-actions">'+
      '<button class="btn outline" data-act="sig-clear">'+esc(t('sig_clear'))+'</button>'+
      '<button class="btn primary" data-act="sig-accept">'+esc(t('sig_accept'))+ic('check',14,'var(--stone)')+'</button>'+
      '<button class="btn outline" data-act="sig-cancel" style="margin-left:auto">'+esc(t('sig_cancel'))+'</button>'+
    '</div>'+
  '</div></div>';
}
function setupSigCanvas(){
  const c = document.getElementById('sig-canvas');
  if(!c) return;
  // adjust canvas resolution to its displayed width for crispness
  const rect = c.getBoundingClientRect();
  c.width = rect.width * 2;
  c.height = 160 * 2;
  c.style.height = '160px';
  const ctx = c.getContext('2d');
  ctx.scale(2,2);
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#222';
  _sigCtx = ctx;
  _sigHasInk = false;
  let drawing = false; let lastX = 0; let lastY = 0;
  const pos = (e) => {
    const r = c.getBoundingClientRect();
    const tp = e.touches ? e.touches[0] : e;
    return { x: tp.clientX - r.left, y: tp.clientY - r.top };
  };
  const start = (e) => { e.preventDefault(); drawing = true; const p = pos(e); lastX=p.x; lastY=p.y; };
  const move = (e) => {
    if(!drawing) return;
    e.preventDefault();
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke();
    lastX=p.x; lastY=p.y; _sigHasInk = true;
    const w = document.getElementById('sig-warn'); if(w) w.style.display = 'none';
  };
  const end = () => { drawing = false; };
  c.addEventListener('mousedown', start);
  c.addEventListener('mousemove', move);
  c.addEventListener('mouseup', end);
  c.addEventListener('mouseleave', end);
  c.addEventListener('touchstart', start, {passive:false});
  c.addEventListener('touchmove', move, {passive:false});
  c.addEventListener('touchend', end);
}

/* ============================================================
   Render + routing
   ============================================================ */
function render(){
  let body;
  switch(S.page){
    case 'home': body = home(); break;
    case 'listings': body = listings(); break;
    case 'detail': body = detail(); break;
    case 'explore': body = explore(); break;
    case 'add': body = addPage(); break;
    case 'operator': body = operator(); break;
    case 'alerts': body = alertsPage(); break;
    case 'terms': body = legal('terms'); break;
    case 'privacy': body = legal('privacy'); break;
    default: body = home();
  }
  const modal = S.sigModal ? sigModalView() : '';
  document.getElementById('app').innerHTML = header() + body + footer() + modal;
  if(S.sigModal) setupSigCanvas();
  window.scrollTo(0,0);
}

/* ============================================================
   Event handlers
   ============================================================ */
document.addEventListener('click', e => {
  const goEl = e.target.closest('[data-go]');
  if(goEl){ S.page = goEl.getAttribute('data-go'); S.detailReq=false; S.addDone=false; S.alertDone=false; S.ex={region:null,country:null}; if(S.page==='operator' && S.opToken && !S.opLoaded){ loadOperator(); } render(); return; }

  const openEl = e.target.closest('[data-open]');
  if(openEl){ const id = openEl.getAttribute('data-open'); const l = S.listings.find(x=>x.id===id); if(l){ S.current=l; S.page='detail'; S.detailReq=false; render(); } return; }

  const pickEl = e.target.closest('[data-pick]');
  if(pickEl){ const [k,v] = pickEl.getAttribute('data-pick').split(':'); if(k==='region') S.ex.region=v; else if(k==='country') S.ex.country=v; render(); return; }

  const crumbEl = e.target.closest('[data-crumb]');
  if(crumbEl){ const c = crumbEl.getAttribute('data-crumb'); if(c==='root'){ S.ex={region:null,country:null}; } else if(c==='region'){ S.ex.country=null; } render(); return; }

  const tabEl = e.target.closest('[data-tab]');
  if(tabEl){ S.opTab = tabEl.getAttribute('data-tab'); render(); return; }

  const opEl = e.target.closest('[data-op]');
  if(opEl){ opAction(opEl.getAttribute('data-op'), opEl.getAttribute('data-id')); return; }

  const actEl = e.target.closest('[data-act]');
  if(actEl){
    const act = actEl.getAttribute('data-act');
    if(act==='lang'){ S.lang = actEl.getAttribute('data-lang'); render(); return; }
    if(act==='op-login'){ opLogin(); return; }
    if(act==='sign'){ S.sigModal = true; render(); return; }
    if(act==='sig-clear'){ if(_sigCtx){ const c = document.getElementById('sig-canvas'); _sigCtx.clearRect(0,0,c.width,c.height); _sigHasInk=false; } return; }
    if(act==='sig-cancel' || act==='sig-bg-click' && e.target===actEl){ S.sigModal=false; render(); return; }
    if(act==='sig-accept'){
      if(!_sigHasInk){ const w=document.getElementById('sig-warn'); if(w) w.style.display='block'; return; }
      const c = document.getElementById('sig-canvas');
      S.sigData = c.toDataURL();
      S.signed = true; S.sigModal = false; render(); return;
    }
    if(act==='req-contact'){ requestContact(); return; }
    if(act==='submit-add'){ submitListing(); return; }
    if(act==='alert-from-listings'){
      S.alertForm = { commodity: S.lf.commodity==='All'?'':S.lf.commodity, country: S.lf.country==='All'?'':S.lf.country, licence: S.lf.licence==='All'?'':S.lf.licence, email:'' };
      S.page = 'alerts'; S.alertDone=false; render(); return;
    }
    if(act==='alert-create'){ createAlertRemote(); return; }
    if(act==='alert-more'){ S.alertDone=false; render(); return; }
    if(act==='alert-delete'){ deleteAlertRemote(actEl.getAttribute('data-token')); return; }
  }
});

document.addEventListener('input', e => {
  const lf = e.target.closest('[data-lf]'); if(lf){ S.lf[lf.getAttribute('data-lf')] = e.target.value; render(); return; }
  const fm = e.target.closest('[data-form]'); if(fm){ S.form[fm.getAttribute('data-form')] = e.target.value; return; }
  const al = e.target.closest('[data-alert]'); if(al){ S.alertForm[al.getAttribute('data-alert')] = e.target.value; return; }
});
document.addEventListener('change', e => {
  const fm = e.target.closest('[data-form]');
  if(fm){
    const k = fm.getAttribute('data-form');
    S.form[k] = e.target.value;
    if(k==='country') S.form.location = '';
    render();
    return;
  }
  const lf = e.target.closest('[data-lf]'); if(lf){ S.lf[lf.getAttribute('data-lf')] = e.target.value; render(); return; }
  const al = e.target.closest('[data-alert]'); if(al){ S.alertForm[al.getAttribute('data-alert')] = e.target.value; return; }
});

/* ============================================================
   Init
   ============================================================ */
boot();
</script>
